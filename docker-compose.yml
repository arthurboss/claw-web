services:
  # Serve pre-built WASM files (build in Linux VM, serve on macOS)
  openclaw:
    image: python:3.11-slim
    container_name: openclaw-server
    working_dir: /game
    volumes:
      - ./Build_Release:/game:ro
    ports:
      - "8081:8080"
    command: python3 -m http.server 8080 --bind 0.0.0.0
    restart: unless-stopped

networks:
  default:
    driver: bridge
